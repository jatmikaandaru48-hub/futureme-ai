<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureMe AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.header{text-align:center;padding:40px;}
.header h1{font-size:42px;color:#38bdf8;}

.container{
max-width:500px;
margin:auto;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
padding:25px;
box-shadow:0 0 40px rgba(56,189,248,0.2);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
}

#loadingBar{
height:4px;
width:0%;
background:#38bdf8;
margin-top:10px;
transition:1.5s;
}

.result{
margin-top:20px;
padding:20px;
background:#1e293b;
border-radius:15px;
display:none;
}

.slideshow img{
width:100%;
border-radius:12px;
margin-top:15px;
opacity:0;
transition:0.8s;
}

.presentasi{
margin-top:20px;
padding:20px;
background:#0f172a;
border-radius:15px;
display:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="header">
<h1>🚀 FutureMe AI</h1>
<p>Simulasi Masa Depan dengan AI</p>
</div>

<div class="container">

<input type="text" id="nama" placeholder="Nama kamu">

<select id="minat">
<option value="">Pilih minat</option>
<option value="teknologi">Teknologi</option>
<option value="seni">Seni</option>
<option value="bisnis">Bisnis</option>
<option value="kesehatan">Kesehatan</option>
<option value="pendidikan">Pendidikan</option>
<option value="hukum">Hukum</option>
<option value="gaming">Gaming</option>
<option value="content">Content Creator</option>
<option value="musik">Musik</option>
<option value="olahraga">Olahraga</option>
<option value="psikologi">Psikologi</option>
<option value="pariwisata">Pariwisata</option>
</select>

<button onclick="generateFuture()">🔮 Analisis Masa Depan</button>

<div id="loadingBar"></div>

<div class="result" id="output"></div>

<button onclick="downloadResult()">📄 Download Hasil</button>

<div class="presentasi" id="presentasi">
<h3>🎤 Tentang FutureMe AI</h3>
<p id="presentasiText"></p>
</div>

</div>

<script>
// PARTICLE
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();
p.y+=0.3;
if(p.y>canvas.height)p.y=0;
});
requestAnimationFrame(animate);
}
animate();

// MAIN
async function generateFuture(){
let nama=document.getElementById("nama").value;
let minat=document.getElementById("minat").value;
let output=document.getElementById("output");
let bar=document.getElementById("loadingBar");

if(!nama||!minat){alert("Isi dulu!");return;}

output.style.display="block";
output.innerHTML="🤖 AI sedang membaca masa depanmu...";
bar.style.width="100%";

await new Promise(r=>setTimeout(r,2000));
bar.style.width="0%";

let profesi={
teknologi:"AI Engineer",
seni:"Creative Artist",
bisnis:"Startup Founder",
kesehatan:"Dokter",
pendidikan:"Guru Inspiratif",
hukum:"Pengacara",
gaming:"Pro Player",
content:"Content Creator",
musik:"Musisi",
olahraga:"Atlet",
psikologi:"Psikolog",
pariwisata:"Travel Expert"
}[minat];

let hasil=`${nama}, masa depanmu sebagai ${profesi} sangat cerah.

Perjalananmu mungkin penuh tantangan, tapi itu akan membentukmu menjadi pribadi kuat.

Di usia 20-an kamu belajar.
Di usia 25 kamu mulai dikenal.
Di usia 30 kamu sukses.

Terus berkembang, karena masa depan dimulai hari ini.`;

// OUTPUT
output.innerHTML=`
<h2>✨ Future Simulation</h2>
<p id="text"></p>
<div class="slideshow"><img id="img1"></div>
`;

typeEffect(hasil,"text");
startSlideshow(minat);

// SUARA
let speech=new SpeechSynthesisUtterance(hasil);
speech.lang="id-ID";
speech.rate=0.95;
speechSynthesis.speak(speech);

// PRESENTASI
showPresentation();
}

// TYPE EFFECT
function typeEffect(text,id){
let i=0;
let el=document.getElementById(id);
el.innerHTML="";
(function t(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(t,20);
}
})();
}

let data = {

]

};

let imgs=data[key]||data.default;
let img=document.getElementById("img1");
let i=0;

function show(){
img.style.opacity=0;
setTimeout(()=>{
img.src=imgs[i];
img.style.opacity=1;
i=(i+1)%imgs.length;
},400);
}

show();
setInterval(show,2500);
}

// DOWNLOAD
function downloadResult(){
let text=document.getElementById("text")?.innerText||"Belum ada hasil";
let blob=new Blob([text]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="future.txt";
a.click();
}

// PRESENTASI
function showPresentation(){
let text=`FutureMe AI membantu pelajar memahami masa depan mereka melalui pengalaman interaktif dan motivatif.`;

let el=document.getElementById("presentasi");
let target=document.getElementById("presentasiText");
el.style.display="block";

let i=0;
(function t(){
if(i<text.length){
target.innerHTML+=text[i++];
setTimeout(t,20);
}
})();
}
</script>

</body>
</html>
